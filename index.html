<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Web Page</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f7f7;
        color: #222;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      button {
        margin-top: 1rem;
        padding: 0.6rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to My Simple Web Page</h1>
      <p>This is a lightweight HTML page with centered content and clean styling.</p>
      <button id="alertBtn" type="button">Click me</button>
    </main>

    <script>
      document.getElementById('alertBtn').addEventListener('click', () => {
        alert('Thanks for clicking!');
      });
    </script>
  </body>
</html>
